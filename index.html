<!DOCTYPE html>
<html>
<head>
    <title>Advanced DOM To-Do App</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 30px;
        }

        .container {
            width: 450px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        input {
            padding: 10px;
            margin-bottom: 10px;
        }

        #taskInput {
            width: 70%;
        }

        #search {
            width: 95%;
            margin-top: 10px;
        }

        button {
            padding: 8px 10px;
            cursor: pointer;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            margin: 3px;
        }

        button:hover {
            background: #0056b3;
        }

        .clear-btn {
            width: 100%;
            margin-top: 10px;
            background: red;
        }

        .clear-btn:hover {
            background: darkred;
        }

        li {
            margin-top: 10px;
            background: #eee;
            padding: 10px;
            border-radius: 5px;
            list-style: none;
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }

        small {
            display: block;
            margin-top: 5px;
            color: gray;
        }

        #count {
            font-weight: bold;
            text-align: center;
        }

        .dark {
            background: #222;
            color: white;
        }

        .dark .container {
            background: #333;
        }

        .dark li {
            background: #444;
        }

        .dark input {
            background: #555;
            color: white;
            border: 1px solid #777;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>My To-Do List</h2>

    <button onclick="toggleDarkMode()">Dark Mode</button>

    <br><br>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <input type="text" id="search" placeholder="Search task..." onkeyup="filterTasks()">

    <p id="count">Tasks: 0</p>

    <div>
        <button onclick="showAll()">All</button>
        <button onclick="showCompleted()">Completed</button>
        <button onclick="showPending()">Pending</button>
    </div>

    <ul id="taskList"></ul>

    <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>

<script>
    function addTask() {
        let input = document.getElementById("taskInput");
        let taskText = input.value.trim();

        if (taskText === "") {
            alert("Please enter a task");
            return;
        }

        let task = {
            text: taskText,
            done: false,
            date: new Date().toLocaleString()
        };

        createTaskElement(task);
        saveTasks();
        updateCount();

        input.value = "";
    }

    function createTaskElement(task) {
        let li = document.createElement("li");

        let taskRow = document.createElement("div");
        taskRow.className = "task-row";

        let span = document.createElement("span");
        span.innerText = task.text;

        if (task.done) {
            span.classList.add("done");
        }

        span.onclick = function () {
            span.classList.toggle("done");
            saveTasks();
            updateCount();
        };

        let btnDiv = document.createElement("div");

        let editBtn = document.createElement("button");
        editBtn.innerText = "Edit";

        editBtn.onclick = function () {
            let newText = prompt("Edit task:", span.innerText);

            if (newText !== null && newText.trim() !== "") {
                span.innerText = newText.trim();
                saveTasks();
            }
        };

        let deleteBtn = document.createElement("button");
        deleteBtn.innerText = "Delete";

        deleteBtn.onclick = function () {
            li.remove();
            saveTasks();
            updateCount();
        };

        btnDiv.appendChild(editBtn);
        btnDiv.appendChild(deleteBtn);

        taskRow.appendChild(span);
        taskRow.appendChild(btnDiv);

        let time = document.createElement("small");
        time.innerText = "Added: " + task.date;

        li.appendChild(taskRow);
        li.appendChild(time);

        document.getElementById("taskList").appendChild(li);
    }

    function saveTasks() {
        let tasks = [];

        document.querySelectorAll("#taskList li").forEach(li => {
            let span = li.querySelector("span");
            let small = li.querySelector("small");

            tasks.push({
                text: span.innerText,
                done: span.classList.contains("done"),
                date: small.innerText.replace("Added: ", "")
            });
        });

        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function loadTasks() {
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

        tasks.forEach(task => {
            createTaskElement(task);
        });

        updateCount();
    }

    function updateCount() {
        let totalTasks = document.querySelectorAll("#taskList li").length;
        document.getElementById("count").innerText = "Tasks: " + totalTasks;
    }

    function clearAll() {
        localStorage.removeItem("tasks");
        document.getElementById("taskList").innerHTML = "";
        updateCount();
    }

    function filterTasks() {
        let searchValue = document.getElementById("search").value.toLowerCase();
        let tasks = document.querySelectorAll("#taskList li");

        tasks.forEach(task => {
            let text = task.querySelector("span").innerText.toLowerCase();
            task.style.display = text.includes(searchValue) ? "block" : "none";
        });
    }

    function showAll() {
        let tasks = document.querySelectorAll("#taskList li");

        tasks.forEach(task => {
            task.style.display = "block";
        });
    }

    function showCompleted() {
        let tasks = document.querySelectorAll("#taskList li");

        tasks.forEach(task => {
            let span = task.querySelector("span");

            if (span.classList.contains("done")) {
                task.style.display = "block";
            } else {
                task.style.display = "none";
            }
        });
    }

    function showPending() {
        let tasks = document.querySelectorAll("#taskList li");

        tasks.forEach(task => {
            let span = task.querySelector("span");

            if (!span.classList.contains("done")) {
                task.style.display = "block";
            } else {
                task.style.display = "none";
            }
        });
    }

    function toggleDarkMode() {
        document.body.classList.toggle("dark");
    }

    document.getElementById("taskInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            addTask();
        }
    });

    window.onload = loadTasks;
</script>

</body>
</html>
